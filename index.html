<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ms. Cool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #070814 0%, #0b0d1a 40%, #131124 70%, #141d1c 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            color: #ffffff;
            padding: 20px;
            position: relative;
        }

        /* Ambient painted sky textures */
        .sky-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 40%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
            z-index: 1;
            pointer-events: none;
        }

        /* Constellation container */
        .constellation-overlay {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 120px;
            z-index: 2;
            pointer-events: none;
        }

        /* Smooth rolling hills with layered blending to prevent cutting */
        .grass-hill {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 15vh;
            background: linear-gradient(to bottom, #092416 0%, #05160e 100%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 4; /* Sits cleanly behind the main canvas elements */
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 0.5s;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        }

        .highlight {
            color: #d1aaff;
            font-weight: 600;
            text-shadow: 0 0 25px rgba(209, 170, 255, 0.4);
        }

        .botanical-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            margin-top: 10px;
        }

        @media (min-width: 900px) {
            .botanical-scene {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .canvas-area {
            position: relative;
            width: 440px;
            height: 440px;
            margin: 0 auto;
            order: 2;
            z-index: 5; /* Forces drawing to overlap hills smoothly */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .note {
            max-width: 280px;
            font-size: 1.05rem;
            line-height: 1.6;
            letter-spacing: 0.5px;
            background: rgba(11, 13, 26, 0.6);
            backdrop-filter: blur(12px);
            padding: 20px;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 6;
        }

        .left-note {
            border-right: 2px solid #ef4444;
            border-radius: 14px 0 0 14px;
            animation: fadeIn 2s ease-in forwards 3.2s;
            text-align: right;
            order: 1;
            color: #fca5a5;
        }

        .right-note {
            border-left: 2px solid #a855f7;
            border-radius: 0 14px 14px 0;
            animation: fadeIn 2s ease-in forwards 3s;
            text-align: left;
            order: 3;
            color: #d1d5db;
        }

        @media (max-width: 899px) {
            .left-note { order: 2; text-align: center; border-right: none; border-bottom: 2px solid #ef4444; border-radius: 0 0 14px 14px; margin-top: 10px; }
            .canvas-area { order: 1; width: 360px; height: 360px; }
            .right-note { order: 3; text-align: center; border-left: none; border-bottom: 2px solid #a855f7; border-radius: 0 0 14px 14px; }
            .grass-hill { height: 8vh; }
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 36px;
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 15px;
            outline: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .music-btn:hover {
            background: #ffffff;
            color: #050507;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sky-art"></div>
    
    <svg class="constellation-overlay" viewBox="0 0 600 120" id="starMap"></svg>
    
    <div class="grass-hill"></div>

    <div class="container">
        <h1>Happy Birthday <span class="highlight">Ms. Cool</span> 😉❤️</h1>

        <div class="botanical-scene">
            <div class="note left-note">
                haha now you olddd and happy birthday and all and blah blah idk what to say lol 🥳👵
            </div>

            <div class="canvas-area">
                <canvas id="botanicalCanvas" width="500" height="500"></canvas>
            </div>
            
            <div class="note right-note">
                honestly i don't really do the html coding thing, so this is about as smooth as my digital artistry gets here... but i’m really glad it worked. hope you like this bloom thing 😁
            </div>
        </div>

        <audio id="bg-music" loop preload="auto">
            <source src="song.mp3" type="audio/mpeg">
            <source src="song.mp3.mp3" type="audio/mpeg">
        </audio>

        <button class="music-btn" onclick="toggleMusic()">▶️ Play</button>
    </div>

    <script>
        // 1. STAR CONSTELLATION MAPPING FOR "ZAINAB"
        const starMap = document.getElementById('starMap');
        const letterPoints = [
            // Z
            [[20,20], [60,20], [20,100], [60,100]],
            // A
            [[90,100], [110,20], [130,100], [100,65], [120,65]],
            // I
            [[160,20], [200,20], [180,20], [180,100], [160,100], [200,100]],
            // N
            [[230,100], [230,20], [270,100], [270,20]],
            // A
            [[300,100], [320,20], [340,100], [310,65], [330,65]],
            // B
            [[370,20], [370,100], [400,20], [410,40], [395,60], [370,60], [415,80], [395,100]]
        ];

        // Draw custom glowing stars mapping out the letters
        letterPoints.forEach(letter => {
            letter.forEach(pt => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                // Shift coordinates slightly right to center the name on screen canvas
                circle.setAttribute("cx", pt[0] + 45);
                circle.setAttribute("cy", pt[1]);
                circle.setAttribute("r", Math.random() * 1.5 + 1.5);
                circle.setAttribute("fill", "#ffffff");
                circle.setAttribute("style", `opacity: ${Math.random() * 0.5 + 0.5}; filter: drop-shadow(0 0 4px rgba(255,255,255,0.9));`);
                starMap.appendChild(circle);
            });
        });

        // 2. BOTANICAL GARDEN CANVAS ENGINE
        const canvas = document.getElementById('botanicalCanvas');
        const ctx = canvas.getContext('2d');

        let animationStarted = false;
        let botanicalProgress = 0;
        let bloomProgress = 0;
        let detailProgress = 0;

        function drawBotanicalScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            // Shifted the anchor point slightly up and embedded into the painted hill seamlessly
            const startY = canvas.height * 0.88; 
            
            const maxCenterLen = 175;
            const currentCenterLen = maxCenterLen * botanicalProgress;

            ctx.shadowColor = 'rgba(2, 12, 6, 0.5)';
            ctx.shadowBlur = 8;
            
            // Draw Main Stems
            drawVine(centerX, startY, centerX, startY - currentCenterLen, '#22c55e', 5, -20);
            
            if (botanicalProgress > 0.25) {
                const p = (botanicalProgress - 0.25) / 0.75;
                drawVine(centerX, startY - 40, centerX - (105 * p), startY - 40 - (100 * p), '#166534', 3.8, -45);
                drawVine(centerX, startY - 55, centerX + (110 * p), startY - 55 - (90 * p), '#166534', 3.8, 45);
            }
            
            if (botanicalProgress > 0.45) {
                const pSmall = (botanicalProgress - 0.45) / 0.55;
                drawVine(centerX, startY - 20, centerX - (60 * pSmall), startY - 20 - (50 * pSmall), '#14532d', 2.8, -15);
                drawVine(centerX, startY - 30, centerX + (55 * pSmall), startY - 30 - (55 * pSmall), '#14532d', 2.8, 20);
            }
            ctx.shadowBlur = 0;

            if (botanicalProgress < 1) {
                botanicalProgress += 0.015;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            drawGardenLeaves(centerX, startY, maxCenterLen);

            const mainRadius = 38;
            const centerFlowerY = startY - maxCenterLen;
            
            // Main Central Bloom
            drawFlower(centerX, centerFlowerY, mainRadius * bloomProgress, '#ef4444', '#b91c1c');

            if (bloomProgress > 0.35) {
                const bloomSide = (bloomProgress - 0.35) / 0.65;
                drawFlower(centerX - 105, startY - 140, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
                drawFlower(centerX + 110, startY - 145, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
            }

            if (bloomProgress > 0.55) {
                const bloomSmall = (bloomProgress - 0.55) / 0.45;
                drawFlower(centerX - 60, startY - 70, (mainRadius * 0.5) * bloomSmall, '#f43f5e', '#be123c');
                drawFlower(centerX + 55, startY - 85, (mainRadius * 0.55) * bloomSmall, '#f472b6', '#be123c');
            }

            if (bloomProgress < 1) {
                bloomProgress += 0.012;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            if (bloomProgress >= 1) {
                drawFlowerPistil(centerX, centerFlowerY, 10 * detailProgress);
                drawFlowerPistil(centerX - 105, startY - 140, 7 * detailProgress);
                drawFlowerPistil(centerX + 110, startY - 145, 7 * detailProgress);
                drawFlowerPistil(centerX - 60, startY - 70, 4 * detailProgress);
                drawFlowerPistil(centerX + 55, startY - 85, 4.5 * detailProgress);

                if (detailProgress < 1) {
                    detailProgress += 0.03;
                    requestAnimationFrame(drawBotanicalScene);
                }
            }
        }

        function drawVine(x1, y1, x2, y2, color, width, curveOffset) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.quadraticCurveTo((x1 + x2) / 2 + curveOffset, (y1 + y2) / 2, x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawGardenLeaves(centerX, startY, totalLen) {
            ctx.fillStyle = '#15803d';
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;

            for (let i = 1; i < 14; i++) {
                const ratio = i / 14;
                const leafY = startY - (totalLen * ratio);
                const isRight = i % 2 === 0;
                const leafX = centerX + (isRight ? 6 : -6);
                drawOrganicLeaf(leafX, leafY, 15, isRight ? 35 : -35);
            }

            drawOrganicLeaf(centerX - 50, startY - 90, 11, -30);
            drawOrganicLeaf(centerX + 55, startY - 105, 11, 30);
            drawOrganicLeaf(centerX - 25, startY - 45, 9, -40);
            drawOrganicLeaf(centerX + 20, startY - 50, 9, 40);
        }

        function drawOrganicLeaf(x, y, radius, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * (Math.PI / 180));
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(radius/2, radius/2, radius, radius, 0, radius);
            ctx.bezierCurveTo(-radius, radius, -radius/2, radius/2, 0, 0);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawFlower(x, y, radius, primary, secondary) {
            const petals = 6;
            ctx.save();
            ctx.translate(x, y);
            
            for (let i = 0; i < petals; i++) {
                ctx.rotate((Math.PI * 2) / petals);
                let gradient = ctx.createRadialGradient(0, 0, 3, 0, -radius, radius);
                gradient.addColorStop(0, primary);
                gradient.addColorStop(1, secondary);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radius/1.4, -radius/1.4, -radius/1.4, -radius, 0, -radius);
                ctx.bezierCurveTo(radius/1.4, -radius, radius/1.4, -radius/1.4, 0, 0);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            ctx.restore();
        }

        function drawFlowerPistil(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15';
            ctx.shadowColor = '#eab308';
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 3. SECURE HIGH-INTERACTION AUDIO TRIGGER
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.querySelector('.music-btn');
            
            // Force browser audio engine activation context
            if (!animationStarted) {
                animationStarted = true;
                // Double tap fallback override for tricky browsers
                music.load(); 
                drawBotanicalScene();
            }

            if (music.paused) {
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        btn.innerHTML = "⏸️ Pause";
                    }).catch(error => {
                        console.log("Audio stream blocked: ", error);
                        // Quick click reset fallback
                        btn.innerHTML = "⚠️ Tap Again to Play";
                    });
                }
            } else {
                music.pause();
                btn.innerHTML = "▶️ Play";
            }
        }
    </script>
</body>
</html>
