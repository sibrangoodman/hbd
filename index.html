<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ms. Cool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #060713 0%, #0b0d1a 40%, #111022 70%, #0f1614 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        .sky-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 75% 25%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        .constellation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .jet {
            position: absolute;
            font-size: 42px; 
            z-index: 3;
            user-select: none;
            pointer-events: none;
            opacity: 0;
        }

        .launch-left {
            opacity: 1;
            top: 22vh;
            transform: rotate(12deg);
            animation: flyLeftToRight 18s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
        }

        .launch-right {
            opacity: 1;
            top: 30vh;
            transform: rotate(-168deg);
            animation: flyRightToLeft 18.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
        }

        @keyframes flyLeftToRight {
            0% { left: -80px; transform: rotate(12deg) scale(0.9); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 115%; opacity: 0; transform: rotate(5deg) scale(0.7); }
        }

        @keyframes flyRightToLeft {
            0% { right: -80px; transform: rotate(-168deg) scale(0.9); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { right: 115%; opacity: 0; transform: rotate(-175deg) scale(0.7); }
        }

        .leaf-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -5vh;
            pointer-events: none;
            user-select: none;
            opacity: 0.8;
            will-change: transform, opacity; /* Tells browser to hardware accelerate leaves */
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.75; }
            90% { opacity: 0.75; }
            100% {
                transform: translateY(110vh) translateX(var(--drift-x)) rotate(var(--rotation));
                opacity: 0;
            }
        }

        .falling-lyric {
            position: absolute;
            font-size: 1.15rem;
            font-weight: 300;
            color: rgba(209, 170, 255, 0.95);
            text-shadow: 0 0 12px rgba(209, 170, 255, 0.4);
            white-space: nowrap;
            pointer-events: none;
            z-index: 20;
            transform: translateX(-50%);
            will-change: top, opacity;
            animation: dropLyric 6.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes dropLyric {
            0% {
                top: 52vh;
                opacity: 0;
                transform: translateX(-50%) scale(0.7);
                filter: blur(4px);
            }
            12% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                filter: blur(0px);
            }
            80% {
                opacity: 0.8;
            }
            100% {
                top: 85vh;
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
                filter: blur(2px);
            }
        }

        .grass-hill {
            position: absolute;
            bottom: -5vh;
            left: -10%;
            width: 120%;
            height: 25vh;
            background: linear-gradient(to bottom, #092215 0%, #04120a 100%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 4; 
            pointer-events: none;
            box-shadow: inset 0 20px 40px rgba(34, 197, 94, 0.04);
        }

        .container {
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px 0 20px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 0.5s;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .highlight {
            color: #d1aaff;
            font-weight: 600;
            text-shadow: 0 0 25px rgba(209, 170, 255, 0.5);
        }

        .botanical-scene {
            display: flex;
            width: 100%;
            flex-grow: 1;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: -15px; 
            z-index: 15;
        }

        .canvas-area {
            position: relative;
            width: 480px;
            height: 440px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .note {
            width: 290px;
            font-size: 1.05rem;
            line-height: 1.6;
            letter-spacing: 0.5px;
            background: rgba(11, 13, 26, 0.65);
            backdrop-filter: blur(15px);
            padding: 22px;
            opacity: 0;
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            margin-bottom: 9vh; 
            border-radius: 14px;
        }

        .left-note {
            border-right: 3px solid #ef4444;
            animation: fadeIn 2s ease-in forwards 2.5s;
            text-align: right;
        }

        .right-note {
            border-left: 3px solid #a855f7;
            animation: fadeIn 2s ease-in forwards 2.3s;
            text-align: left;
        }

        .controls-area {
            width: 100%;
            height: 12vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 40px;
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .music-btn:hover {
            background: #ffffff;
            color: #050507;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .container { height: auto; padding-bottom: 20px; }
            .botanical-scene { flex-direction: column; align-items: center; margin-bottom: 0; }
            .canvas-area { width: 340px; height: 320px; margin-top: 20px; }
            .note { margin-bottom: 20px; width: 100%; max-width: 320px; text-align: center !important; border-left: none !important; border-right: none !important; border-bottom: 3px solid; }
            .left-note { order: 2; border-bottom-color: #ef4444; }
            .right-note { order: 3; border-bottom-color: #a855f7; }
            .controls-area { height: auto; margin-top: 20px; }
            .grass-hill { height: 150px; bottom: -20px; }
            .falling-lyric { font-size: 1rem; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="birthdayTrack" loop preload="auto" crossorigin="anonymous">
        <source src="https://files.catbox.moe/j8gedr.mp3" type="audio/mpeg">
    </audio>

    <div class="sky-art"></div>
    <svg class="constellation-overlay" id="starMap"></svg>
    <div class="leaf-container" id="leafContainer"></div>
    
    <div id="jet-left" class="jet">✈️</div>
    <div id="jet-right" class="jet">✈️</div>

    <div class="grass-hill"></div>

    <div class="container">
        <h1>Happy Birthday <span class="highlight">Ms. Cool</span> 😉❤️</h1>

        <div class="botanical-scene">
            <div class="note left-note">
                haha now you olddd and happy birthday and all and blah blah idk what to say lol 🥳👵
            </div>

            <div class="canvas-area">
                <canvas id="botanicalCanvas" width="480" height="440"></canvas>
            </div>
            
            <div class="note right-note">
                honestly i don't really do the html coding thing, so this is about as smooth as my digital artistry gets here... but i’m really glad it worked. hope you like this bloom thing 😁
            </div>
        </div>

        <div class="controls-area">
            <button class="music-btn" onclick="toggleMusic()">🎵 PLAY</button>
        </div>
    </div>

    <script>
        // 1. CONSTELLATION GENERATOR
        const starMap = document.getElementById('starMap');
        const letterGroups = [
            [[30,40], [42,40], [55,40], [30,100], [42,100], [55,100], [48,60], [38,80]],
            [[75,100], [82,70], [90,40], [98,70], [105,100], [83,75], [97,75]],
            [[125,40], [137,40], [150,40], [137,60], [137,80], [125,100], [137,100], [150,100]],
            [[170,100], [170,70], [170,40], [182,60], [194,80], [205,100], [205,70], [205,40]],
            [[225,100], [232,70], [240,40], [248,70], [255,100], [233,75], [247,75]],
            [[275,40], [275,70], [275,100], [290,40], [300,55], [290,70], [302,85], [290,100]]
        ];

        function drawSkyElements() {
            starMap.innerHTML = '';
            const totalWidth = window.innerWidth;
            const totalHeight = window.innerHeight;
            starMap.setAttribute("viewBox", `0 0 ${totalWidth} ${totalHeight}`);
            
            const wordWidth = 330; 
            const startX = (totalWidth - wordWidth) / 2;
            const startY = totalHeight * 0.18; 

            letterGroups.forEach(letter => {
                letter.forEach(pt => {
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", startX + pt[0]);
                    circle.setAttribute("cy", startY + (pt[1] - 40));
                    circle.setAttribute("r", Math.random() * 0.8 + 2.0); 
                    circle.setAttribute("fill", "#ffffff");
                    circle.setAttribute("style", `opacity: 0.95; filter: drop-shadow(0 0 5px rgba(255,255,255,0.95));`);
                    starMap.appendChild(circle);
                });
            });

            const totalBackgroundStars = Math.floor(totalWidth / 12); 
            for(let i = 0; i < totalBackgroundStars; i++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", Math.random() * totalWidth);
                circle.setAttribute("cy", Math.random() * (totalHeight * 0.75)); 
                circle.setAttribute("r", Math.random() * 0.9 + 0.4);
                circle.setAttribute("fill", "rgba(255,255,255,0.45)");
                starMap.appendChild(circle);
            }
        }
        drawSkyElements();
        window.addEventListener('resize', drawSkyElements);

        // 2. OPTIMIZED FULL-SCREEN LEAF ENGINE
        const leafContainer = document.getElementById('leafContainer');
        const leafTypes = ['🍃', '🌸', '🍁', '🌱', '🌹', '🍂'];
        
        function spawnLeaf() {
            // Memory check: don't spawn if tab is clogged up
            if (document.hidden) return;

            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.innerText = leafTypes[Math.floor(Math.random() * leafTypes.length)];
            
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.fontSize = Math.random() * 10 + 14 + 'px';
            
            const driftX = (Math.random() * 240 - 120) + 'px';
            const rotation = (Math.random() * 400 + 360) + 'deg';
            leaf.style.setProperty('--drift-x', driftX);
            leaf.style.setProperty('--rotation', rotation);
            
            const duration = Math.random() * 4 + 7; 
            leaf.style.animationDuration = duration + 's';
            
            leafContainer.appendChild(leaf);
            setTimeout(() => leaf.remove(), duration * 1000);
        }

        // 3. LYRICS TIMELINES WITH ADJUSTED OFFSETS FOR ABSOLUTE PLAYBACK HIGH STABILITY
        const lyricsTimeline = [
            { time: 11.2, text: "I know I stand in line until you think you have the time" },
            { time: 15.2, text: "To spend an evening with me" },
            { time: 18.6, text: "And if we go someplace to dance, I know that there's a chance" },
            { time: 23.2, text: "You won't be leaving with me" },
            { time: 27.2, text: "Then afterwards we drop into a quiet little place" },
            { time: 30.6, text: "And have a drink or two" },
            { time: 34.6, text: "And then I go and spoil it all by saying something stupid" },
            { time: 39.2, text: "Like: \"I love you\"" },
            { time: 43.6, text: "I can see it in your eyes that you despise the same old lines" },
            { time: 48.2, text: "You heard the night before" },
            { time: 51.6, text: "And though it's just a line to you, for me it's true" },
            { time: 55.6, text: "And never seemed so right before" }
        ];

        let lastTriggeredLyric = -1;

        function checkLyricsSync(currentTime) {
            for (let i = 0; i < lyricsTimeline.length; i++) {
                if (currentTime >= lyricsTimeline[i].time && lastTriggeredLyric < i) {
                    if (i > lastTriggeredLyric) {
                        lastTriggeredLyric = i;
                        dropLyricFromFlower(lyricsTimeline[i].text);
                    }
                }
            }
        }

        function dropLyricFromFlower(text) {
            const lyricEl = document.createElement('div');
            lyricEl.className = 'falling-lyric';
            lyricEl.innerText = text;
            lyricEl.style.left = '50%';
            
            document.body.appendChild(lyricEl);
            setTimeout(() => lyricEl.remove(), 6500);
        }

        // 4. BOTANICAL GARDEN CANVAS ENGINE
        const canvas = document.getElementById('botanicalCanvas');
        const ctx = canvas.getContext('2d');

        let animationStarted = false;
        let botanicalProgress = 0;
        let bloomProgress = 0;
        let detailProgress = 0;

        function drawBotanicalScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const startY = canvas.height; 
            const maxCenterLen = 175;
            const currentCenterLen = maxCenterLen * botanicalProgress;

            drawVine(centerX, startY, centerX, startY - currentCenterLen, '#22c55e', 5.5, -10);
            
            if (botanicalProgress > 0.2) {
                const p = (botanicalProgress - 0.2) / 0.8;
                drawVine(centerX, startY - 35, centerX - (130 * p), startY - 35 - (115 * p), '#166534', 4, -30);
                drawVine(centerX, startY - 50, centerX + (135 * p), startY - 50 - (105 * p), '#166534', 4, 30);
            }
            if (botanicalProgress > 0.45) {
                const pSmall = (botanicalProgress - 0.45) / 0.55;
                drawVine(centerX, startY - 15, centerX - (80 * pSmall), startY - 15 - (60 * pSmall), '#14532d', 2.8, -15);
                drawVine(centerX, startY - 25, centerX + (75 * pSmall), startY - 25 - (65 * pSmall), '#14532d', 2.8, 15);
            }

            if (botanicalProgress < 1) {
                botanicalProgress += 0.015;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            drawGardenLeaves(centerX, startY, maxCenterLen);
            const mainRadius = 38;
            const centerFlowerY = startY - maxCenterLen;
            drawFlower(centerX, centerFlowerY, mainRadius * bloomProgress, '#ef4444', '#b91c1c');

            if (bloomProgress > 0.35) {
                const bloomSide = (bloomProgress - 0.35) / 0.65;
                drawFlower(centerX - 130, startY - 150, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
                drawFlower(centerX + 135, startY - 155, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
            }
            if (bloomProgress > 0.55) {
                const bloomSmall = (bloomProgress - 0.55) / 0.45;
                drawFlower(centerX - 80, startY - 75, (mainRadius * 0.52) * bloomSmall, '#f43f5e', '#be123c');
                drawFlower(centerX + 75, startY - 90, (mainRadius * 0.56) * bloomSmall, '#f472b6', '#be123c');
            }

            if (bloomProgress < 1) {
                bloomProgress += 0.012;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            if (bloomProgress >= 1) {
                drawFlowerPistil(centerX, centerFlowerY, 10 * detailProgress);
                drawFlowerPistil(centerX - 130, startY - 150, 7 * detailProgress);
                drawFlowerPistil(centerX + 135, startY - 155, 7 * detailProgress);
                drawFlowerPistil(centerX - 80, startY - 75, 4 * detailProgress);
                drawFlowerPistil(centerX + 75, startY - 90, 4.5 * detailProgress);

                if (detailProgress < 1) {
                    detailProgress += 0.03;
                    requestAnimationFrame(drawBotanicalScene);
                }
            }
        }

        function drawVine(x1, y1, x2, y2, color, width, curveOffset) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.quadraticCurveTo((x1 + x2) / 2 + curveOffset, (y1 + y2) / 2, x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawGardenLeaves(centerX, startY, totalLen) {
            ctx.fillStyle = '#15803d';
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;
            for (let i = 1; i < 14; i++) {
                const ratio = i / 14;
                const leafY = startY - (totalLen * ratio);
                const isRight = i % 2 === 0;
                const leafX = centerX + (isRight ? 5 : -5);
                drawOrganicLeaf(leafX, leafY, 15, isRight ? 35 : -35);
            }
        }

        function drawOrganicLeaf(x, y, radius, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * (Math.PI / 180));
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(radius/2, radius/2, radius, radius, 0, radius);
            ctx.bezierCurveTo(-radius, radius, -radius/2, radius/2, 0, 0);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawFlower(x, y, radius, primary, secondary) {
            const petals = 6;
            ctx.save();
            ctx.translate(x, y);
            for (let i = 0; i < petals; i++) {
                ctx.rotate((Math.PI * 2) / petals);
                let gradient = ctx.createRadialGradient(0, 0, 3, 0, -radius, radius);
                gradient.addColorStop(0, primary);
                gradient.addColorStop(1, secondary);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radius/1.4, -radius/1.4, -radius/1.4, -radius, 0, -radius);
                ctx.bezierCurveTo(radius/1.4, -radius, radius/1.4, -radius/1.4, 0, 0);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            ctx.restore();
        }

        function drawFlowerPistil(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15';
            ctx.fill();
        }

        // 5. OPTIMIZED RUNTIME CLOCK THROTTLING
        const track = document.getElementById('birthdayTrack');
        let syncInterval = null;

        function toggleMusic() {
            const btn = document.querySelector('.music-btn');
            
            if (!animationStarted) {
                animationStarted = true;
                
                document.getElementById('jet-left').classList.add('launch-left');
                document.getElementById('jet-right').classList.add('launch-right');
                
                // Slightly slowed down rate to free up CPU processing threads
                setInterval(spawnLeaf, 380); 
                
                drawBotanicalScene();
            }

            if (track.paused) {
                track.play().then(() => {
                    btn.innerHTML = "⏸️ PAUSE";
                    // Throttled time tracker: runs smoothly every 250ms instead of every single frame
                    syncInterval = setInterval(() => {
                        checkLyricsSync(track.currentTime);
                    }, 250);
                }).catch(err => {
                    btn.innerHTML = "⏸️ PAUSE";
                });
            } else {
                track.pause();
                clearInterval(syncInterval);
                btn.innerHTML = "🎵 PLAY";
            }
        }
    </script>
</body>
</html>
