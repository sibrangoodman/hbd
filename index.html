<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ms. Cool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050507;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            color: #ffffff;
            padding: 15px;
        }

        .bg-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 80%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 950px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 0.5s;
        }

        .highlight {
            color: #d1aaff;
            font-weight: 600;
            text-shadow: 0 0 25px rgba(209, 170, 255, 0.4);
        }

        .botanical-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .botanical-scene {
                flex-direction: row;
                align-items: center;
                text-align: left;
            }
        }

        .canvas-area {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .sincere-note {
            max-width: 300px;
            font-size: 1.05rem;
            color: #d1d5db;
            line-height: 1.6;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid #a855f7;
            padding: 18px 22px;
            border-radius: 0 14px 14px 0;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 2.5s;
            text-align: left;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 28px;
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 15px;
            outline: none;
            backdrop-filter: blur(5px);
        }

        .music-btn:hover {
            background: #ffffff;
            color: #050507;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>Happy Birthday <span class="highlight">Ms. Cool</span> 😉❤️</h1>

        <div class="botanical-scene">
            <div class="canvas-area">
                <canvas id="botanicalCanvas" width="400" height="400"></canvas>
            </div>
            
            <div class="sincere-note">
                honestly i don't really do the html coding thing, so this is about as smooth as my digital artistry gets... but i’m really glad it worked. hope you like this bloom thing 😁
            </div>
        </div>

        <audio id="bg-music" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>

        <button class="music-btn" onclick="toggleMusic()">🎵 ACTIVATE VIBE</button>
    </div>

    <script>
        const canvas = document.getElementById('botanicalCanvas');
        const ctx = canvas.getContext('2d');

        let animationStarted = false;
        let botanicalProgress = 0;
        let bloomProgress = 0;
        let detailProgress = 0;

        function drawBotanicalScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const startY = canvas.height * 0.95;
            const maxVineLength = 160;
            const currentVineLength = maxVineLength * botanicalProgress;

            // 1. Draw Stems/Vines
            ctx.shadowColor = '#064e3b';
            ctx.shadowBlur = 4;
            
            // Central main stem
            drawVine(centerX, startY, centerX, startY - currentVineLength, '#22c55e', 4);
            
            // Branching side stems
            if (botanicalProgress > 0.4) {
                const branchP = (botanicalProgress - 0.4) / 0.6;
                drawVine(centerX, startY - 40, centerX + (65 * branchP), startY - 40 - (70 * branchP), '#166534', 3);
                drawVine(centerX, startY - 70, centerX - (65 * branchP), startY - 70 - (70 * branchP), '#166534', 3);
            }
            ctx.shadowBlur = 0;

            if (botanicalProgress < 1) {
                botanicalProgress += 0.02;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            // 2. Draw Green Leaves
            drawLeaves(centerX, startY, maxVineLength);

            // 3. Draw Flowers blooming
            const maxRadius = 35;
            const mainFlowerY = startY - maxVineLength;
            
            // Main Central Flower (Red)
            drawFlower(centerX, mainFlowerY, maxRadius * bloomProgress, '#ef4444', '#b91c1c');

            // Side Flowers (Pink)
            if (bloomProgress > 0.5) {
                const sideP = (bloomProgress - 0.5) / 0.5;
                drawFlower(centerX + 65, startY - 110, (maxRadius * 0.75) * sideP, '#f472b6', '#db2777');
                drawFlower(centerX - 65, startY - 140, (maxRadius * 0.75) * sideP, '#f472b6', '#db2777');
            }

            if (bloomProgress < 1) {
                bloomProgress += 0.015;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            // 4. Draw Center Pollen Details
            if (bloomProgress >= 1) {
                drawFlowerPistil(centerX, mainFlowerY, 10 * detailProgress);
                drawFlowerPistil(centerX + 65, startY - 110, 7 * detailProgress);
                drawFlowerPistil(centerX - 65, startY - 140, 7 * detailProgress);

                if (detailProgress < 1) {
                    detailProgress += 0.04;
                    requestAnimationFrame(drawBotanicalScene);
                }
            }
        }

        function drawVine(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.quadraticCurveTo((x1 + x2) / 2 - 15, (y1 + y2) / 2, x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawLeaves(centerX, startY, totalLen) {
            ctx.fillStyle = '#15803d';
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;

            for (let i = 2; i < 12; i++) {
                const ratio = i / 12;
                const leafY = startY - (totalLen * ratio);
                const isRight = i % 2 === 0;
                const leafX = centerX + (isRight ? 8 : -8);

                drawOrganicLeaf(leafX, leafY, 15, isRight ? 45 : -45);
            }
        }

        function drawOrganicLeaf(x, y, radius, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * (Math.PI / 180));
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(radius/2, radius/2, radius, radius, 0, radius);
            ctx.bezierCurveTo(-radius, radius, -radius/2, radius/2, 0, 0);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawFlower(x, y, radius, primary, secondary) {
            const petals = 6;
            ctx.save();
            ctx.translate(x, y);
            
            for (let i = 0; i < petals; i++) {
                ctx.rotate((Math.PI * 2) / petals);
                
                let gradient = ctx.createRadialGradient(0, 0, 3, 0, -radius, radius);
                gradient.addColorStop(0, primary);
                gradient.addColorStop(1, secondary);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radius/1.4, -radius/1.4, -radius/1.4, -radius, 0, -radius);
                ctx.bezierCurveTo(radius/1.4, -radius, radius/1.4, -radius/1.4, 0, 0);
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            ctx.restore();
        }

        function drawFlowerPistil(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15';
            ctx.shadowColor = '#eab308';
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.querySelector('.music-btn');
            
            if (!animationStarted) {
                animationStarted = true;
                drawBotanicalScene();
            }

            if (music.paused) {
                music.play().catch(err => console.log("Audio interaction check"));
                btn.innerHTML = "⏸️ PAUSE VIBE";
            } else {
                music.pause();
                btn.innerHTML = "🎵 ACTIVATE VIBE";
            }
        }
    </script>
</body>
</html>
