<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ms. Cool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #060713 0%, #0b0d1a 40%, #111022 70%, #0f1614 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        .sky-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 75% 25%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Full-screen wide scattered constellation layer */
        .constellation-overlay {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            height: 25vh;
            z-index: 2;
            pointer-events: none;
        }

        /* Fixed Ground Hill at the very bottom */
        .grass-hill {
            position: absolute;
            bottom: -5vh;
            left: -10%;
            width: 120%;
            height: 25vh;
            background: linear-gradient(to bottom, #092215 0%, #04120a 100%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 4; 
            pointer-events: none;
            box-shadow: inset 0 20px 40px rgba(34, 197, 94, 0.04);
        }

        .container {
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px 0 20px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 0.5s;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .highlight {
            color: #d1aaff;
            font-weight: 600;
            text-shadow: 0 0 25px rgba(209, 170, 255, 0.5);
        }

        /* Layout structure anchoring everything down */
        .botanical-scene {
            display: flex;
            width: 100%;
            flex-grow: 1;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: -15px; /* Pulls base right into hill overlap line */
            z-index: 15;
        }

        .canvas-area {
            position: relative;
            width: 480px;
            height: 440px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .note {
            width: 290px;
            font-size: 1.05rem;
            line-height: 1.6;
            letter-spacing: 0.5px;
            background: rgba(11, 13, 26, 0.65);
            backdrop-filter: blur(15px);
            padding: 22px;
            opacity: 0;
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            margin-bottom: 9vh; /* Hovers perfectly above the hill layer */
            border-radius: 14px;
        }

        .left-note {
            border-right: 3px solid #ef4444;
            animation: fadeIn 2s ease-in forwards 2.5s;
            text-align: right;
        }

        .right-note {
            border-left: 3px solid #a855f7;
            animation: fadeIn 2s ease-in forwards 2.3s;
            text-align: left;
        }

        /* Controls Area centered inside the green hill ground */
        .controls-area {
            width: 100%;
            height: 12vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 40px;
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .music-btn:hover {
            background: #ffffff;
            color: #050507;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .container { height: auto; padding-bottom: 20px; }
            .botanical-scene { flex-direction: column; align-items: center; margin-bottom: 0; }
            .canvas-area { width: 340px; height: 320px; margin-top: 20px; }
            .note { margin-bottom: 20px; width: 100%; max-width: 320px; text-align: center !important; border-left: none !important; border-right: none !important; border-bottom: 3px solid; }
            .left-note { order: 2; border-bottom-color: #ef4444; }
            .right-note { order: 3; border-bottom-color: #a855f7; }
            .controls-area { height: auto; margin-top: 20px; }
            .grass-hill { height: 150px; bottom: -20px; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sky-art"></div>
    <svg class="constellation-overlay" id="starMap" preserveAspectRatio="none"></svg>
    <div class="grass-hill"></div>

    <div class="container">
        <h1>Happy Birthday <span class="highlight">Ms. Cool</span> 😉❤️</h1>

        <div class="botanical-scene">
            <div class="note left-note">
                haha now you olddd and happy birthday and all and blah blah idk what to say lol 🥳👵
            </div>

            <div class="canvas-area">
                <canvas id="botanicalCanvas" width="480" height="440"></canvas>
            </div>
            
            <div class="note right-note">
                honestly i don't really do the html coding thing, so this is about as smooth as my digital artistry gets here... but i’m really glad it worked. hope you like this bloom thing 😁
            </div>
        </div>

        <div class="controls-area">
            <button class="music-btn" onclick="toggleMusic()">▶️ Play</button>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
        <source src="song.mp3.mp3" type="audio/mpeg">
        <source src="./song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. SCATTERED WIDE SKY CONSTELLATION MAP (Spelling ZAINAB clearly across screen width)
        const starMap = document.getElementById('starMap');
        
        // Letter coordinates mapped into percentage widths across the viewport layout
        const constellation = [
            // Z
            [[5,20], [12,20], [5,80], [12,80], [7,60], [9,40]],
            // A
            [[18,80], [21,20], [24,80], [19.5,55], [22.5,55]],
            // I
            [[31,20], [35,20], [33,20], [33,80], [31,80], [35,80]],
            // N
            [[42,80], [42,20], [48,80], [48,20], [45,50]],
            // A
            [[55,80], [58,20], [61,80], [56.5,55], [59.5,55]],
            // B
            [[69,20], [69,80], [73,20], [75,35], [72,50], [69,50], [75,65], [73,80]]
        ];

        function buildConstellation() {
            starMap.innerHTML = '';
            const width = window.innerWidth;
            
            // Render letters
            constellation.forEach(letter => {
                letter.forEach(pt => {
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    const xCoord = (pt[0] / 100) * width;
                    const yCoord = pt[1];
                    
                    circle.setAttribute("cx", xCoord);
                    circle.setAttribute("cy", yCoord);
                    circle.setAttribute("r", Math.random() * 1.5 + 1.8);
                    circle.setAttribute("fill", "#ffffff");
                    circle.setAttribute("style", `opacity: ${Math.random() * 0.4 + 0.6}; filter: drop-shadow(0 0 5px rgba(255,255,255,0.95));`);
                    starMap.appendChild(circle);
                });
            });

            // Fill empty background with scattered smaller cosmic dust stars
            for(let i=0; i<45; i++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", Math.random() * width);
                circle.setAttribute("cy", Math.random() * 100);
                circle.setAttribute("r", Math.random() * 1);
                circle.setAttribute("fill", "rgba(255,255,255,0.4)");
                starMap.appendChild(circle);
            }
        }
        
        buildConstellation();
        window.addEventListener('resize', buildConstellation);

        // 2. BOTANICAL GARDEN CANVAS ENGINE
        const canvas = document.getElementById('botanicalCanvas');
        const ctx = canvas.getContext('2d');

        let animationStarted = false;
        let botanicalProgress = 0;
        let bloomProgress = 0;
        let detailProgress = 0;

        function drawBotanicalScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const startY = canvas.height; // Sets roots 100% at the very baseline bottom frame edge
            
            const maxCenterLen = 175;
            const currentCenterLen = maxCenterLen * botanicalProgress;

            ctx.shadowColor = 'rgba(2, 12, 6, 0.5)';
            ctx.shadowBlur = 8;
            
            drawVine(centerX, startY, centerX, startY - currentCenterLen, '#22c55e', 5.5, -10);
            
            if (botanicalProgress > 0.2) {
                const p = (botanicalProgress - 0.2) / 0.8;
                drawVine(centerX, startY - 35, centerX - (130 * p), startY - 35 - (115 * p), '#166534', 4, -30);
                drawVine(centerX, startY - 50, centerX + (135 * p), startY - 50 - (105 * p), '#166534', 4, 30);
            }
            
            if (botanicalProgress > 0.45) {
                const pSmall = (botanicalProgress - 0.45) / 0.55;
                drawVine(centerX, startY - 15, centerX - (80 * pSmall), startY - 15 - (60 * pSmall), '#14532d', 2.8, -15);
                drawVine(centerX, startY - 25, centerX + (75 * pSmall), startY - 25 - (65 * pSmall), '#14532d', 2.8, 15);
            }
            ctx.shadowBlur = 0;

            if (botanicalProgress < 1) {
                botanicalProgress += 0.015;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            drawGardenLeaves(centerX, startY, maxCenterLen);

            const mainRadius = 38;
            const centerFlowerY = startY - maxCenterLen;
            
            drawFlower(centerX, centerFlowerY, mainRadius * bloomProgress, '#ef4444', '#b91c1c');

            if (bloomProgress > 0.35) {
                const bloomSide = (bloomProgress - 0.35) / 0.65;
                drawFlower(centerX - 130, startY - 150, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
                drawFlower(centerX + 135, startY - 155, (mainRadius * 0.85) * bloomSide, '#f472b6', '#db2777');
            }

            if (bloomProgress > 0.55) {
                const bloomSmall = (bloomProgress - 0.55) / 0.45;
                drawFlower(centerX - 80, startY - 75, (mainRadius * 0.52) * bloomSmall, '#f43f5e', '#be123c');
                drawFlower(centerX + 75, startY - 90, (mainRadius * 0.56) * bloomSmall, '#f472b6', '#be123c');
            }

            if (bloomProgress < 1) {
                bloomProgress += 0.012;
                requestAnimationFrame(drawBotanicalScene);
                return;
            }

            if (bloomProgress >= 1) {
                drawFlowerPistil(centerX, centerFlowerY, 10 * detailProgress);
                drawFlowerPistil(centerX - 130, startY - 150, 7 * detailProgress);
                drawFlowerPistil(centerX + 135, startY - 155, 7 * detailProgress);
                drawFlowerPistil(centerX - 80, startY - 75, 4 * detailProgress);
                drawFlowerPistil(centerX + 75, startY - 90, 4.5 * detailProgress);

                if (detailProgress < 1) {
                    detailProgress += 0.03;
                    requestAnimationFrame(drawBotanicalScene);
                }
            }
        }

        function drawVine(x1, y1, x2, y2, color, width, curveOffset) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.quadraticCurveTo((x1 + x2) / 2 + curveOffset, (y1 + y2) / 2, x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawGardenLeaves(centerX, startY, totalLen) {
            ctx.fillStyle = '#15803d';
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;

            for (let i = 1; i < 14; i++) {
                const ratio = i / 14;
                const leafY = startY - (totalLen * ratio);
                const isRight = i % 2 === 0;
                const leafX = centerX + (isRight ? 5 : -5);
                drawOrganicLeaf(leafX, leafY, 15, isRight ? 35 : -35);
            }
            drawOrganicLeaf(centerX - 65, startY - 100, 12, -30);
            drawOrganicLeaf(centerX + 70, startY - 110, 12, 30);
        }

        function drawOrganicLeaf(x, y, radius, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * (Math.PI / 180));
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(radius/2, radius/2, radius, radius, 0, radius);
            ctx.bezierCurveTo(-radius, radius, -radius/2, radius/2, 0, 0);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawFlower(x, y, radius, primary, secondary) {
            const petals = 6;
            ctx.save();
            ctx.translate(x, y);
            for (let i = 0; i < petals; i++) {
                ctx.rotate((Math.PI * 2) / petals);
                let gradient = ctx.createRadialGradient(0, 0, 3, 0, -radius, radius);
                gradient.addColorStop(0, primary);
                gradient.addColorStop(1, secondary);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radius/1.4, -radius/1.4, -radius/1.4, -radius, 0, -radius);
                ctx.bezierCurveTo(radius/1.4, -radius, radius/1.4, -radius/1.4, 0, 0);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            ctx.restore();
        }

        function drawFlowerPistil(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15';
            ctx.shadowColor = '#eab308';
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 3. FORCE DIRECTED REPOSITORY PATH AUDIO CONTROLLER
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.querySelector('.music-btn');
            
            if (!animationStarted) {
                animationStarted = true;
                // Force load internal media stream relative to context folder
                music.src = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/song.mp3';
                music.load();
                drawBotanicalScene();
            }

            const playPromise = music.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    if (music.paused) {
                        btn.innerHTML = "▶️ Play";
                    } else {
                        btn.innerHTML = "⏸️ Pause";
                    }
                }).catch(error => {
                    // Fallback to try alternative double-extension path directly if primary path is cached out
                    console.log("Primary track path failed, executing backup track stream layout...");
                    music.src = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/song.mp3.mp3';
                    music.play().then(() => {
                        btn.innerHTML = "⏸️ Pause";
                    }).catch(err => {
                        btn.innerHTML = "⚠️ Clear Cache & Click Again";
                    });
                });
            }
            
            if (!music.paused && animationStarted) {
                // If it's already playing, allow toggle to pause smoothly
                if (btn.innerHTML === "⏸️ Pause") {
                    music.pause();
                    btn.innerHTML = "▶️ Play";
                }
            }
        }
    </script>
</body>
</html>
